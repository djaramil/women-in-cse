<?xml version="1.0" encoding="UTF-8"?>
<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Circle -->
  <circle cx="150" cy="150" r="145" fill="#003366" stroke="#CC0000" stroke-width="5"/>
  
  <!-- Inner Circle -->
  <circle cx="150" cy="150" r="130" fill="none" stroke="white" stroke-width="2"/>
  
  <!-- FAU Text -->
  <text x="150" y="165" font-family="Arial, Helvetica, sans-serif" font-size="90" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">FAU</text>
  
  <!-- Florida Atlantic University Text Arc Top -->
  <path id="topArc" d="M 50,150 A 100,100 0 0,1 250,150" fill="none"/>
  <text fill="white" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="600">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">
      FLORIDA ATLANTIC UNIVERSITY
    </textPath>
  </text>
  
  <!-- Owls Text Bottom -->
  <text x="150" y="240" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#CC0000" text-anchor="middle">OWLS</text>
</svg>
